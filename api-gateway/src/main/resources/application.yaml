server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: ms-admin
          uri: lb://msadmin
          predicates:
            - Path=/admin/**

        - id: ms-checkin
          uri: lb://mscheckin
          predicates:
            - Path=/checkin/**

        - id: ms-checkout
          uri: lb://mscheckout
          predicates:
            - Path=/checkout/**

        - id: ms-habitacion
          uri: lb://mshabitacion
          predicates:
            - Path=/habitacion/**

        - id: ms-reserva
          uri: lb://msreserva
          predicates:
            - Path=/reserva/**

        - id: ms-servicio
          uri: lb://msservicio
          predicates:
            - Path=/servicio/**

        - id: ms-tipo-habitacion
          uri: lb://mstipohabitacion
          predicates:
            - Path=/tipohabitacion/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true